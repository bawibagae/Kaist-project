<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>코딩 to-do-list</title>
    <!-- 구글 폰트 적용 (Pretendard와 유사한 느낌의 Noto Sans KR) -->
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>🚀 코딩 to-do-list</h1>
            <p>과제와 영상 링크를 한곳에서 관리하세요.</p>
        </header>

        <main>
            <!-- 게시글 작성 및 수정 영역 -->
            <section id="form-section" class="card">
                <h2 id="form-title">📝 게시글 작성</h2>
                <form id="post-form">
                    <input type="hidden" id="edit-id">
                    <input type="hidden" id="edit-type">
                    
                    <div class="input-group">
                        <label for="post-type">카테고리</label>
                        <select id="post-type">
                            <option value="list">일반 과제/할 일</option>
                            <option value="video">코딩 영상 링크</option>
                        </select>
                    </div>

                    <div class="input-group">
                        <label for="title">제목</label>
                        <input type="text" id="title" placeholder="제목을 입력하세요" required>
                    </div>

                    <div class="input-group">
                        <label for="username">작성자</label>
                        <input type="text" id="username" placeholder="이름을 입력하세요" required>
                    </div>

                    <div class="input-group">
                        <label for="text" id="content-label">내용 (또는 영상 URL)</label>
                        <textarea id="text" rows="3" placeholder="내용이나 영상 링크를 입력하세요" required></textarea>
                    </div>

                    <div class="button-group">
                        <button type="submit" id="save-btn" class="btn btn-primary">저장하기</button>
                        <button type="button" id="cancel-btn" class="btn btn-secondary" style="display: none;">취소</button>
                    </div>
                </form>
            </section>

            <!-- 목록 표시 영역 -->
            <div class="lists-container">
                <!-- 일반 과제 리스트 -->
                <section class="list-section card">
                    <h2>📅 일반 과제 리스트</h2>
                    <div id="list-posts-container" class="post-list">
                        <!-- JS에서 데이터가 채워집니다 -->
                        <p class="empty-msg">데이터를 불러오는 중...</p>
                    </div>
                </section>

                <!-- 영상 링크 리스트 -->
                <section class="list-section card">
                    <h2>📺 코딩 영상 리스트</h2>
                    <div id="video-posts-container" class="post-list">
                        <!-- JS에서 데이터가 채워집니다 -->
                        <p class="empty-msg">데이터를 불러오는 중...</p>
                    </div>
                </section>
            </div>
        </main>

        <footer>
            <p>&copy; 2026 김예준 & 최재우 - 코딩 to-do-list 팀 프로젝트</p>
        </footer>
    </div>

    <!-- 스크립트 연결 -->
    <script src="app.js"></script>
</body>
</html>
