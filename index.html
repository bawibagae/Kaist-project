<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LUXURY SPACE | 미래형 관리 시스템</title>
    <link rel="stylesheet" href="style.css">
    <!-- Font Awesome for subtle icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="stars-container" id="stars-container"></div>

    <div class="container">
        <header>
            <h1>LUXURY SPACE</h1>
            <p>Cosmic Coding Task Management System</p>
        </header>

        <!-- Auth Section -->
        <div id="auth-container">
            <div id="login-section" class="card">
                <h2>Login</h2>
                <div class="input-group">
                    <label>아이디 (ID)</label>
                    <input type="text" id="login-id" placeholder="ID를 입력하세요">
                </div>
                <div class="input-group">
                    <label>비밀번호 (PW)</label>
                    <input type="password" id="login-pw" placeholder="Password를 입력하세요">
                </div>
                <div class="button-group">
                    <button class="btn btn-gold" onclick="handleLogin()">로그인</button>
                    <button class="btn btn-outline" onclick="toggleAuth(false)">회원가입</button>
                </div>
            </div>

            <div id="signup-section" class="card hidden">
                <h2>Register</h2>
                <div class="input-group">
                    <label>아이디</label>
                    <input type="text" id="signup-id" placeholder="사용할 ID">
                </div>
                <div class="input-group">
                    <label>비밀번호</label>
                    <input type="password" id="signup-pw" placeholder="비밀번호">
                </div>
                <div class="input-group">
                    <label>GitHub Profile</label>
                    <input type="text" id="signup-github" placeholder="https://github.com/your-id">
                </div>
                <div class="button-group">
                    <button class="btn btn-gold" onclick="handleSignup()">가입 완료</button>
                    <button class="btn btn-outline" onclick="toggleAuth(true)">로그인으로</button>
                </div>
            </div>
        </div>

        <!-- Main Content -->
        <div id="main-content" class="hidden">
            <div class="auth-nav">
                <span id="user-info">Awaiting Identity...</span>
                <button class="btn btn-outline btn-sm" onclick="handleLogout()">로그아웃</button>
            </div>

            <div class="card">
                <h2>GitHub Station</h2>
                <p>본인의 깃허브 메인 스테이션으로 이동합니다.</p>
                <a id="my-github-link" href="#" target="_blank" class="btn btn-gold">
                    Connect to GitHub 🚀
                </a>
            </div>

            <section class="card">
                <h2>New Record</h2>
                <div class="input-group">
                    <label>카테고리 (Category)</label>
                    <select id="post-type">
                        <option value="list">일반 임무 (Task)</option>
                        <option value="video">참고 영상 (YouTube/Link)</option>
                        <option value="github">깃허브 링크 (Repository)</option>
                    </select>
                </div>
                <div class="input-group">
                    <label>제목</label>
                    <input type="text" id="title" placeholder="임무의 제목을 입력하세요">
                </div>
                <div class="input-group">
                    <label>내용 / URL</label>
                    <textarea id="text" rows="3" placeholder="내용 또는 링크를 입력하세요"></textarea>
                </div>
                <button class="btn btn-gold" onclick="savePost()">기록 저장</button>
            </section>

            <div class="lists-grid">
                <section class="card">
                    <h2>Task Management</h2>
                    <div id="list-posts-container"></div>
                </section>
                <section class="card">
                    <h2>Resource Archive</h2>
                    <div id="video-posts-container"></div>
                </section>
            </div>
        </div>

        <footer>
            <p>&copy; 2026 LUXURY SPACE PROJECT. All rights reserved.</p>
        </footer>
    </div>

    <script>
        // Subtle Organic Star Generator
        const container = document.getElementById('stars-container');
        for (let i = 0; i < 200; i++) {
            const star = document.createElement('div');
            star.className = 'star star-subtle';
            const size = Math.random() * 2 + 0.5 + 'px';
            star.style.width = size;
            star.style.height = size;
            star.style.left = Math.random() * 100 + '%';
            star.style.top = Math.random() * 100 + '%';
            star.style.setProperty('--d', Math.random() * 4 + 3 + 's');
            container.appendChild(star);
        }
    </script>
    <script src="app.js"></script>
</body>
</html>
