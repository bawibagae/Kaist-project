<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LUXURY SPACE | 미래형 관리 시스템</title>
    <link rel="stylesheet" href="style.css">
    <!-- Font Awesome for Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="stars-container" id="stars-container"></div>

    <div class="container">
        <header>
            <h1>LUXURY SPACE</h1>
            <p>Cosmic Coding Task Management System</p>
        </header>

        <!-- Auth Section -->
        <div id="auth-container">
            <div id="login-section" class="card">
                <h2><i class="fas fa-key"></i> 로그인</h2>
                <div class="input-group">
                    <label>ID</label>
                    <input type="text" id="login-id" placeholder="탐험가 ID">
                </div>
                <div class="input-group">
                    <label>Password</label>
                    <input type="password" id="login-pw" placeholder="비밀번호">
                </div>
                <div class="button-group">
                    <button class="btn btn-gold" onclick="handleLogin()">로그인</button>
                    <button class="btn btn-outline" onclick="toggleAuth(false)">가입하기</button>
                </div>
            </div>

            <div id="signup-section" class="card hidden">
                <h2><i class="fas fa-user-plus"></i> 탐험가 등록</h2>
                <div class="input-group">
                    <label>ID</label>
                    <input type="text" id="signup-id" placeholder="사용할 ID">
                </div>
                <div class="input-group">
                    <label>Password</label>
                    <input type="password" id="signup-pw" placeholder="비밀번호">
                </div>
                <div class="input-group">
                    <label>GitHub Profile</label>
                    <input type="text" id="signup-github" placeholder="https://github.com/your-id">
                </div>
                <div class="button-group">
                    <button class="btn btn-gold" onclick="handleSignup()">등록 완료</button>
                    <button class="btn btn-outline" onclick="toggleAuth(true)">로그인으로</button>
                </div>
            </div>
        </div>

        <!-- Main Content -->
        <div id="main-content" class="hidden">
            <div class="auth-nav">
                <span id="user-info">탐험가 대기 중...</span>
                <button class="btn btn-outline btn-sm" onclick="handleLogout()">로그아웃</button>
            </div>

            <div class="card">
                <h2><i class="fab fa-github"></i> 궤도 진입 (My GitHub)</h2>
                <p>본인의 깃허브 메인 스테이션으로 이동합니다.</p>
                <a id="my-github-link" href="#" target="_blank" class="btn btn-gold">
                    <i class="fab fa-github"></i> GitHub Station
                </a>
            </div>

            <section class="card">
                <h2><i class="fas fa-plus-circle"></i> 임무 기록</h2>
                <div class="input-group">
                    <label>카테고리</label>
                    <select id="post-type">
                        <option value="list">일반 임무 (Task)</option>
                        <option value="video">참고 영상 (YouTube/Link)</option>
                        <option value="github">깃허브 링크 (Repository)</option>
                    </select>
                </div>
                <div class="input-group">
                    <label>제목</label>
                    <input type="text" id="title" placeholder="임무의 핵심 제목">
                </div>
                <div class="input-group">
                    <label>내용 / URL</label>
                    <textarea id="text" rows="3" placeholder="내용 또는 링크를 입력하세요"></textarea>
                </div>
                <button class="btn btn-gold" onclick="savePost()">기록 저장</button>
            </section>

            <div class="lists-grid">
                <section class="card">
                    <h2><i class="fas fa-list-check"></i> 태스크 리스트</h2>
                    <div id="list-posts-container"></div>
                </section>
                <section class="card">
                    <h2><i class="fas fa-link"></i> 링크 아카이브</h2>
                    <div id="video-posts-container"></div>
                </section>
            </div>
        </div>

        <footer>
            <p>&copy; 2026 LUXURY SPACE PROJECT. Designed for the Future.</p>
        </footer>
    </div>

    <script>
        // Star Generator
        const container = document.getElementById('stars-container');
        for (let i = 0; i < 150; i++) {
            const star = document.createElement('div');
            star.className = 'star';
            const size = Math.random() * 3 + 'px';
            star.style.width = size;
            star.style.height = size;
            star.style.left = Math.random() * 100 + '%';
            star.style.top = Math.random() * 100 + '%';
            star.style.setProperty('--duration', Math.random() * 3 + 2 + 's');
            container.appendChild(star);
        }
    </script>
    <script src="app.js"></script>
</body>
</html>
